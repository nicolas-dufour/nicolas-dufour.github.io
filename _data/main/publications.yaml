      &nbsp;&nbsp;  author          ={Lucas Degeorge and Arijit Ghosh and Nicolas Dufour and David Picard and Vicky Kalogeiton}, \n
      &nbsp;&nbsp;  year            ={2025}, \n
      &nbsp;&nbsp;  journal         ={arXiv}, \n
