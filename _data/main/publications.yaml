- title: "PoM: A Linear-Time Replacement for Attention with the Polynomial Mixer"
  authors: <a href="https://davidpicard.github.io/">David Picard</a>, <u><a href="#">Nicolas Dufour</a></u>, <a href="https://lucasdegeorge.github.io/">Lucas Degeorge</a>, <a href="https://arijit-hub.github.io/">Arijit Ghosh</a>, <a href="https://davidea97.github.io/">Davide Allegro</a>, Tom Ravaud, <a href="https://yohannperron.github.io/WebPage/">Yohann Perron</a>, <a href="https://csautier.github.io/">Corentin Sautier</a>, <a href="https://imagine.enpc.fr/~sonat.baltaci/">Zeynep Sonat Baltaci</a>, <a href="https://imagine-lab.enpc.fr/staff-members/fei-meng/">Fei Meng</a>, <a href="https://imagine-lab.enpc.fr/staff-members/syrine-kalleli/">Syrine Kalleli</a>, <a href="https://imagine.enpc.fr/~marta.lopez-rauhut/">Marta López-Rauhut</a>, <a href="https://thibautloiseau.github.io/">Thibaut Loiseau</a>, <a href="https://imagine-lab.enpc.fr/staff-members/segolene-albouy/">Ségolène Albouy</a>, <a href="https://raphael-baena.github.io/">Raphael Baena</a>, <a href="https://imagine.enpc.fr/~vincente/">Elliot Vincent</a>, <a href="https://loiclandrieu.com/">Loic Landrieu</a>
  date: 2026-06-05
  year: 2026
  journal: CVPR Findings 2026
  thumbnail: /assets/publications/pom/thumbnail.png
  pdf:  https://arxiv.org/abs/2604.06129
  github: https://github.com/davidpicard/pom
  abstract: "This paper introduces the Polynomial Mixer (PoM), a novel token mixing mechanism with linear complexity that serves as a drop-in replacement for self-attention. PoM aggregates input tokens into a compact representation through a learned polynomial function, from which each token retrieves contextual information. We prove that PoM satisfies the contextual mapping property, ensuring that transformers equipped with PoM remain universal sequence-to-sequence approximators. We replace standard self-attention with PoM across five diverse domains: text generation, handwritten text recognition, image generation, 3D modeling, and Earth observation. PoM matches the performance of attention-based models while drastically reducing computational cost when working with long sequences."
